name: Build Mobile Apps

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_android:
        description: 'Build Android APK'
        required: true
        default: true
        type: boolean
      build_ios:
        description: 'Build iOS App'
        required: true
        default: false
        type: boolean

env:
  NODE_VERSION: '22'
  JAVA_VERSION: '21'

jobs:
  # ============================================================
  # ANDROID BUILD
  # ============================================================
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    if: github.event.inputs.build_android != 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_R2_API_BASE: ${{ secrets.VITE_R2_API_BASE }}
          VITE_R2_PUBLIC_URL: ${{ secrets.VITE_R2_PUBLIC_URL }}

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Build Android APK (Debug)
        working-directory: ./android
        run: ./gradlew assembleDebug

      - name: Build Android AAB (Release)
        working-directory: ./android
        run: ./gradlew bundleRelease
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          retention-days: 7

  # ============================================================
  # iOS BUILD
  # ============================================================
  build-ios:
    name: Build iOS App
    runs-on: macos-latest
    if: github.event.inputs.build_ios != 'false'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.VITE_TURNSTILE_SITE_KEY }}
          VITE_R2_API_BASE: ${{ secrets.VITE_R2_API_BASE }}
          VITE_R2_PUBLIC_URL: ${{ secrets.VITE_R2_PUBLIC_URL }}

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Setup Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install CocoaPods
        working-directory: ./ios/App
        run: pod install --repo-update

      - name: Build iOS (Simulator)
        working-directory: ./ios/App
        run: |
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -destination 'platform=iOS Simulator,name=iPhone 15' \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO

      - name: Build iOS (Archive)
        if: github.ref == 'refs/heads/main'
        working-directory: ./ios/App
        run: |
          xcodebuild clean archive \
            -workspace App.xcworkspace \
            -scheme App \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app
          path: |
            ${{ runner.temp }}/App.xcarchive
            ios/App/build/*.ipa
          retention-days: 7
          if-no-files-found: warn

  # ============================================================
  # NOTIFICATION
  # ============================================================
  notify:
    name: Notify on completion
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|----------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Android | ${{ needs.build-android.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| iOS | ${{ needs.build-ios.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Downloads" >> $GITHUB_STEP_SUMMARY
          echo "- Android APK: Check the **android-apk** artifact" >> $GITHUB_STEP_SUMMARY
          echo "- Android AAB: Check the **android-aab** artifact" >> $GITHUB_STEP_SUMMARY
          echo "- iOS Archive: Check the **ios-app** artifact" >> $GITHUB_STEP_SUMMARY
